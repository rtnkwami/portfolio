name: CI Pipeline
run-name: "CI Run for change: ${{ github.event.head_commit.message }}"

on:
  push:
    branches:
      - '**'

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: moonrepo/setup-toolchain@v0
        with:
          auto-install: true
      - run: moon ci :test :lint --base main

  detect-changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      changes: ${{ steps.changes.outputs.changes }}
    
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      
      - uses: moonrepo/setup-toolchain@v0
        with:
          auto-install: true
      
      - id: changes
        run: echo changes=$(moon run scripts:detect-changes -q) >> $GITHUB_OUTPUT
  
  containerize:
    runs-on: ubuntu-latest
    needs: [detect-changes, validate]
    if: ${{ github.ref_name == 'main' && needs.detect-changes.outputs.changes != '[]' }}
    permissions:
      contents: read
      id-token: write
    strategy:
      matrix:
        app: ${{ fromJson(needs.detect-changes.outputs.changes) }}
    
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      
      - uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}
      
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v4

      - uses: moonrepo/setup-toolchain@v0
        with:
          auto-install: true
      
      - name: Normalize Image Name
        id: image
        run: echo "name=$(echo '${{ matrix.app }}' | tr '/' '-')" >> $GITHUB_OUTPUT

      - name: Prune Workspace for Docker
        run: moon docker scaffold ${{ matrix.app }}
      
      - uses: docker/build-push-action@v7
        env:
          REPOSITORY: ${{ steps.image.outputs.name }}
          IMAGE_TAG: ${{ github.sha }}
        with:
          push: true
          context: .
          file: apps/${{ matrix.app }}/Dockerfile
          platforms: linux/amd64,linux/arm64
          tags: |
              ${{ vars.DOCKERHUB_USERNAME }}/${{ env.REPOSITORY }}:${{ env.IMAGE_TAG }}
              ${{ vars.DOCKERHUB_USERNAME }}/${{ env.REPOSITORY }}:latest
