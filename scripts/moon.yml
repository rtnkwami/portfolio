project:
  name: Monorepo Scripts
  description: |
    This project contains all the scripts needed within the repo, from scripts in
    CI/CD to scripts for installing or cleaning up resources in the repo.
  
  maintainers:
    - Robert Kwami


tasks:
  detect-changes:
    description: Detects which projects have been affected by changes in the repo.
    command: uv run detect-changes.py
    toolchain: "uv"
    options:
      cache: false