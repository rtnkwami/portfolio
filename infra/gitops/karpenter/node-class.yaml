apiVersion: karpenter.k8s.aws/v1
kind: EC2NodeClass
metadata:
  name: default
spec:
  role: "KarpenterNodeRole-portfolio-eks-cluster"
  amiFamily: AL2023
  amiSelectorTerms:
    - alias: al2023@latest
  subnetSelectorTerms:
    - tags:
        karpenter.sh/discovery: "portfolio-eks-cluster"
  securityGroupSelectorTerms:
    - tags:
        karpenter.sh/discovery: "portfolio-eks-cluster"