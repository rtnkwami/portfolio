# yaml-language-server: $schema=https://raw.githubusercontent.com/awslabs/goformation/master/schema/cloudformation.schema.json
AWSTemplateFormatVersion: 2010-09-09
Description: Use CloudFormation to create the S3 bucket to store the terraform state for EKS

Parameters:
  GitHubRepository:
    Type: String
    Description: Repository should be of type org/repo
    Default: rtnkwami/portfolio

Resources:
  TerraformStateBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: niovial-opentofu-state
      VersioningConfiguration:
        Status: Enabled
  
  GHActionsProvider:
    Type: AWS::IAM::OIDCProvider
    Properties:
      Url: "https://token.actions.githubusercontent.com"
      ClientIdList:
        - "sts.amazonaws.com"

  TerraformStateManager:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Action: "sts:AssumeRoleWithWebIdentity"
            Principal:
              Federated: !GetAtt GHActionsProvider.Arn
            Condition:
              StringEquals:
                "token.actions.githubusercontent.com:aud": "sts.amazonaws.com"
                "token.actions.githubusercontent.com:repository": !Sub "${GitHubRepository}"
                "token.actions.githubusercontent.com:ref": "refs/heads/main"
              StringLike:
                "token.actions.githubusercontent.com:sub": !Sub "repo:${GitHubRepository}:*"
      Policies:
        - PolicyName: TerraformStateAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:ListBucket
                  - s3:DeleteObject
                  - s3:PutObject
                Resource:
                  - !GetAtt TerraformStateBucket.Arn
                  - !Sub "${TerraformStateBucket.Arn}/*"

Outputs:
  TfStateBucketName:
    Value: !Ref TerraformStateBucket
  TerraformStateManagerRoleArn:
    Value: !GetAtt TerraformStateManager.Arn
    