apiVersion: apps/v1
kind: Deployment
metadata:
  name: atelier-frontend
spec:
  selector:
    matchLabels:
      app.kubernetes.io/component: frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/component: frontend
    spec:
      containers:
      - name: atelier
        image: rtnkwami/atelier-frontend
        resources:
          requests:
            memory: "256Mi"
            cpu: "200m"
          limits:
            memory: "256Mi"
            cpu: "200m"
        env:
          - name: BACKEND_URL
            value: atelier-backend
        ports:
        - name: frontend
          containerPort: 4000
