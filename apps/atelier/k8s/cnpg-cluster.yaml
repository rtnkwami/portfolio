apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: atelier-db
  labels:
    app.kubernetes.io/component: database
spec:
  instances: 3
  resources:
    requests:
      memory: "4Gi"
      cpu: "2000m"
    limits:
      memory: "4Gi"
      cpu: "2000m"
  storage:
    size: "20Gi"
  postgresql:
    synchronous:
      method: any
      number: 1
      dataDurability: required
    parameters:
      shared_buffers: "1Gi"
  affinity:
    nodeSelector:
      node-role.kubernetes.io/workload: database
    enablePodAntiAffinity: true
    topologyKey: topology.kubernetes.io/zone
    podAntiAffinityType: required
    tolerations:
      - key: node-role.kubernetes.io/workload
        operator: Equal
        value: database
        effect: NoSchedule