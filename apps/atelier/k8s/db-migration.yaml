apiVersion: batch/v1
kind: Job
metadata:
  name: atelier-db-migration
  argocd.argoproj.io/hook: Sync
  argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
  argocd.argoproj.io/sync-wave: "-2"
  labels:
    app.kubernetes.io/name: atelier
spec:
  template:
    spec:
      resources:
        requests:
          memory: "256Mi"
          cpu: "200m"
        limits:
          memory: "256Mi"
          cpu: "200m"
      containers:
      - name: migration-runner
        image: rtnkwami/atelier-backend
        command: ["node", "dist/migrate.js"]
        env:
          - name: DATABASE_URL
            valueFrom:
              secretKeyRef:
                name: atelier-db-app
                key: uri
      restartPolicy: Never
