apiVersion: batch/v1
kind: Job
metadata:
  name: atelier-db-migration
spec:
  template:
    spec:
      containers:
      - name: migration-runner
        image: rtnkwami/atelier-backend
        command: ["node", "dist/migrate.js"]
        env:
          - name: DATABASE_URL
            valueFrom:
              secretKeyRef:
                name: atelier-db-app
                key: uri
      restartPolicy: Never
