project:
  name: Atelier Backend API
  description: |
    Atelier is an ecommerce application written to explore system design and DevOps.
    This is the second half of the application: the backend API. As an overview, below is
    the tech stack being used for this API:
    - REST
    - NestJS
    - MikroORM
    - PostgreSQL
    - Redis

  maintainers:
    - Robert Kwami

tags:
  - atelier
  - containerized

stack: backend

tasks:
  build:
    command: 'pnpm build'
    outputs:
      - 'dist/**/*'
  test:
    command: 'pnpm test'
  lint:
    command: 'pnpm lint'
  
  openapi:
    command: 'pnpm openapi'
    deps:
      - 'build'
  generate-sdk:
    command: pnpm -w oats apps/atelier/openapi.yaml -o packages/atelier/contracts/src/schema.ts
    deps:
      - openapi
  sdk-sync:
    deps:
      - atelier/contracts:build
  