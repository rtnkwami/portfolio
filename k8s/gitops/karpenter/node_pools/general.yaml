apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: general-spot
spec:
  weight: 80
  template:
    metadata:
      labels:
        node-role.kubernetes.io/general-purpose: general-purpose
        app.kubernetes.io/managed-by: karpenter
        niovial.com/workload: general-purpose
    spec:
      nodeClassRef:
        group: karpenter.k8s.aws
        kind: EC2NodeClass
        name: default
      requirements:
        - key: "karpenter.sh/capacity-type"
          operator: In
          values: ["spot"]
        - key: "karpenter.k8s.aws/instance-category"
          operator: In
          values: ["t", "m"]
        - key: "karpenter.k8s.aws/instance-size"
          operator: In
          values: ["small", "medium", "large"]
        - key: "kubernetes.io/arch"
          operator: In
          values: ["arm64"]
      expireAfter: 168h
      startupTaints:
        - key: node.cilium.io/agent-not-ready
          effect: NoSchedule
  disruption:
    consolidationPolicy: WhenEmptyOrUnderutilized
    consolidateAfter: 1m
    budgets:
      - nodes: 10%
---
