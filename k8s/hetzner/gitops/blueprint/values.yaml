globals:
  destinationServer: https://kubernetes.default.svc
  clusterName: portfolio-eks-cluster

system:
  victoria-metrics-k8s-stack:
    chart: victoria-metrics-k8s-stack
    repoURL: oci://ghcr.io/victoriametrics/helm-charts/victoria-metrics-k8s-stack
    targetRevision: 0.78.0
    namespace: monitoring
    syncWave: "1"
    syncOptions:
      - RespectIgnoreDifferences=true
    ignoreDifferences:
      - group: admissionregistration.k8s.io
        kind: ValidatingWebhookConfiguration
        jqPathExpressions:
          - .webhooks[]?.clientConfig.caBundle
      - kind: Secret
        jsonPointers:
          - /data/admin-password
      - group: ""
        kind: Secret
        name: validation
        namespace: monitoring
        jsonPointers:
          - /data
      - group: apps
        kind: Deployment
        jsonPointers:
          - /spec/template/metadata/annotations/checksum~1secret
  
  cnpg:
    chart: cloudnative-pg
    repoURL: oci://ghcr.io/cloudnative-pg/charts/cloudnative-pg
    targetRevision: 0.28.2
    namespace: cnpg-system
    syncWave: "2"

  keda:
    chart: keda
    repoURL: https://kedacore.github.io/charts
    targetRevision: 2.19.0
    namespace: keda
    syncWave: "2"