project:
  name: EKS 
  description: |
    This project deploys an EKS cluster to AWS so that other apps in this monorepo
    can be deployed.

  maintainers:
    - Robert Kwami

tags: [Root, EKS]

stack: infrastructure

tasks:
  init:
    command: 'tofu init'
    toolchain: 'system'

  plan:
    command: 'tofu plan'
    args: '-out outputs/tfplan'
    toolchain: 'system'
    deps: ['~:init']
    outputs: ['outputs/tfplan']
    options:
      cache: false

  deploy:
    command: 'tofu apply outputs/tfplan'
    toolchain: 'system'
    deps: ['~:plan']
    inputs: ['outputs/tfplan']
    options:
      cache: false

  destroy:
    command: 'tofu destroy'
    args: '--auto-approve'
    toolchain: 'system'
    deps: ['~:init']
    options:
      cache: false