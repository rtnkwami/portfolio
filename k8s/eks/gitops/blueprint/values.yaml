globals:
  destinationServer: https://kubernetes.default.svc
  clusterName: portfolio-eks-cluster

system:
  karpenter-crd:
    chart: karpenter
    repoURL: oci://public.ecr.aws/karpenter/karpenter-crd
    targetRevision: 1.11.1
    namespace: kube-system
    syncWave: "-2"

  gateway-api-crds:
    repoURL: https://github.com/kubernetes-sigs/gateway-api
    path: config/crd/experimental
    targetRevision: v1.5.1
    namespace: "kube-system"
    syncWave: "-2"
  
  karpenter:
    chart: karpenter
    repoURL: oci://public.ecr.aws/karpenter/karpenter
    targetRevision: 1.11.1
    namespace: kube-system
    syncWave: "-1"
    values:
      settings:
        clusterName: portfolio-eks-cluster
        interruptionQueue: KarpenterInterruptionQueue-portfolio-eks-cluster
      serviceAccount:
        name: "karpenter"
      nodeSelector:
        niovial.io/node-purpose: system

  cnpg:
    chart: cloudnative-pg
    repoURL: oci://ghcr.io/cloudnative-pg/charts/cloudnative-pg
    targetRevision: 0.28.2
    namespace: cnpg-system
    syncWave: "-1"
    values:
      nodeSelector:
        niovial.io/node-purpose: system
      tolerations:
        - key: CriticalAddonsOnly
          operator: Equal
          value: "true"
          effect: NoSchedule

  keda:
    chart: keda
    repoURL: https://kedacore.github.io/charts
    targetRevision: 2.19.0
    namespace: keda
    syncWave: "-1"
    values:
      nodeSelector:
        niovial.io/node-purpose: system
      tolerations:
        - key: CriticalAddonsOnly
          operator: Equal
          value: "true"
          effect: NoSchedule

  karpenter-config:
    repoURL: https://github.com/rtnkwami/portfolio.git
    path: k8s/eks/gitops/karpenter
    targetRevision: HEAD
    namespace: "kube-system"
    syncWave: "0"