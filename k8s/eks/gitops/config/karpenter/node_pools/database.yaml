apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: database
spec:
  template:
    metadata:
      labels:
        node-role.kubernetes.io/database: ""
        niovial.io/node-purpose: database
    spec:
      nodeClassRef:
        group: karpenter.k8s.aws
        kind: EC2NodeClass
        name: default
      taints:
        - key: niovial.io/node-purpose
          value: database
          effect: NoSchedule
      requirements:
        - key: "karpenter.sh/capacity-type"
          operator: In
          values: ["on-demand"]
        - key: "karpenter.k8s.aws/instance-category"
          operator: In
          values: ["t", "m", "c", "r"]
        - key: "kubernetes.io/arch"
          operator: In
          values: ["arm64"]
      expireAfter: 168h
      startupTaints:
        - key: node.cilium.io/agent-not-ready
          effect: NoSchedule
  disruption:
    consolidationPolicy: WhenEmpty
    consolidateAfter: 30m
    budgets:
      - nodes: 10%