apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: monitoring
spec:
  template:
    metadata:
      labels:
        node-role.kubernetes.io/observability: observability
        app.kubernetes.io/managed-by: karpenter
        niovial.com/workload: observability
    spec:
      nodeClassRef:
        group: karpenter.k8s.aws
        kind: EC2NodeClass
        name: default
      taints:
        - key: niovial.com/workload
          value: observability
          effect: NoSchedule
      requirements:
        - key: "karpenter.sh/capacity-type"
          operator: In
          values: ["on-demand"]
        - key: "karpenter.k8s.aws/instance-category"
          operator: In
          values: ["t", "m"]
        - key: "karpenter.k8s.aws/instance-size"
          operator: In
          values: ["small", "medium", "large"]
        - key: "kubernetes.io/arch"
          operator: In
          values: ["arm64"]
      expireAfter: 168h
      startupTaints:
        - key: node.cilium.io/agent-not-ready
          effect: NoSchedule
  disruption:
    consolidationPolicy: WhenEmptyOrUnderutilized
    consolidateAfter: 1m
    budgets:
      - nodes: 10%
